[pytest]
# ---------------------------------------------------------------------------
# pytest.ini — project-level pytest configuration
# ---------------------------------------------------------------------------
 
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
 
# Output verbosity
addopts =
    --tb=short
    --strict-markers
    -v
 
# Markers (must match declarations in conftest.py)
markers =
    requires_cuda: test requires a CUDA-capable GPU
    requires_sm89: test requires Ada Lovelace (sm_89) specifically
    slow: long-running tests excluded from fast CI runs
 
# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:torch
 